<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Diagnóstico NAVE — Organize sua obra antes de usar IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #002B40;
    --bg-soft: #001c2b;
    --card: #093a52;
    --card-border: #12577a;
    --text: #ffffff;
    --text-dim: #a9cbdb;
    --text-faint: #6e93a6;
    --blue: #1792c0;
    --blue-glow: rgba(23,146,192,.4);
    --orange: #35b8e6;
    --orange-dim: #1792c0;
    --green: #34d399;
    --red: #f87171;
    --rocket: #FF7A50;
    --rocket-dim: #E1502B;
    --radius: 16px;
    --maxw: 620px;
    --font-head: 'Space Grotesk', 'Inter', sans-serif;
    --font-body: 'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(circle at 50% -10%, #0a3f57 0%, var(--bg) 55%);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    max-width:var(--maxw);
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding:24px 20px 40px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:var(--font-head);
    font-weight:700;
    letter-spacing:.06em;
    font-size:14px;
    color:var(--text-dim);
    margin-bottom:8px;
  }
  .brand .dot{width:7px;height:7px;border-radius:50%;background:var(--orange);box-shadow:0 0 10px var(--orange);}
  .brand-icon{flex-shrink:0; filter:drop-shadow(0 0 5px rgba(255,122,80,.45));}
  .progress-wrap{
    height:4px;
    background:var(--card-border);
    border-radius:99px;
    overflow:hidden;
    margin:18px 0 28px;
  }
  .progress-bar{
    height:100%;
    background:linear-gradient(90deg, var(--blue), var(--orange));
    border-radius:99px;
    transition:width .4s ease;
  }
  .screen{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    animation:fadeSlide .45s ease;
  }
  @keyframes fadeSlide{
    from{opacity:0; transform:translateY(14px);}
    to{opacity:1; transform:translateY(0);}
  }
  .eyebrow{
    font-size:12px;
    font-weight:600;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--orange);
    margin-bottom:10px;
  }
  h1{
    font-family:var(--font-head);
    font-size:30px;
    line-height:1.2;
    margin:0 0 14px;
    font-weight:700;
  }
  h2{
    font-family:var(--font-head);
    font-size:22px;
    line-height:1.3;
    margin:0 0 8px;
    font-weight:600;
  }
  p.sub{
    color:var(--text-dim);
    font-size:15.5px;
    line-height:1.55;
    margin:0 0 22px;
  }
  .meta-row{
    display:flex;
    align-items:center;
    gap:8px;
    color:var(--text-faint);
    font-size:13px;
    margin-bottom:6px;
  }
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    border:none;
    border-radius:12px;
    padding:16px 22px;
    font-size:16px;
    font-weight:600;
    font-family:var(--font-body);
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    width:100%;
  }
  .btn:active{transform:scale(.98);}
  .btn-primary{
    background:linear-gradient(90deg, var(--orange), var(--orange-dim));
    color:#ffffff;
    box-shadow:0 8px 24px rgba(23,146,192,.35);
  }
  .btn-primary:hover{opacity:.94;}
  .btn-secondary{
    background:transparent;
    border:1px solid var(--card-border);
    color:var(--text);
  }
  .btn-ghost{
    background:transparent;
    color:var(--text-faint);
    font-size:14px;
    padding:10px;
    font-weight:500;
    text-decoration:underline;
    text-underline-offset:3px;
  }
  .btn[disabled]{opacity:.35; cursor:not-allowed;}
  .btn-row{display:flex; gap:10px; margin-top:6px;}
  .btn-row .btn{width:auto; flex:1;}
  .options{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:22px;
  }
  .option{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:15px 16px;
    background:var(--card);
    border:1.5px solid var(--card-border);
    border-radius:12px;
    cursor:pointer;
    font-size:15.5px;
    font-weight:500;
    transition:border-color .15s ease, background .15s ease;
  }
  .option:hover{border-color:var(--blue);}
  .option.selected{
    border-color:var(--blue);
    background:linear-gradient(90deg, rgba(23,146,192,.18), rgba(23,146,192,.05));
  }
  .option .check{
    width:18px;height:18px;border-radius:50%;
    border:2px solid var(--card-border);
    flex-shrink:0;
    position:relative;
  }
  .option.selected .check{border-color:var(--blue); background:var(--blue);}
  .option.selected .check::after{
    content:'';
    position:absolute; top:50%; left:50%;
    width:6px; height:6px; border-radius:50%;
    background:#fff; transform:translate(-50%,-50%);
  }
  input[type=text], input[type=number], input[type=email], input[type=tel], textarea, select{
    width:100%;
    background:var(--card);
    border:1.5px solid var(--card-border);
    border-radius:12px;
    padding:15px 16px;
    color:var(--text);
    font-size:15.5px;
    font-family:var(--font-body);
    margin-bottom:16px;
    outline:none;
    transition:border-color .15s ease;
    appearance:none;
    -webkit-appearance:none;
  }
  select{
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%239aa7c7'/></svg>");
    background-repeat:no-repeat;
    background-position:right 16px center;
  }
  select option{background:var(--card); color:var(--text);}
  input::placeholder, textarea::placeholder{color:var(--text-faint);}
  input:focus, textarea:focus, select:focus{border-color:var(--blue);}
  textarea{resize:vertical; min-height:80px;}
  .field-label{
    font-size:13px;
    color:var(--text-faint);
    margin:-6px 0 8px;
  }
  .scale-row{display:flex; gap:8px; margin-bottom:22px;}
  .scale-btn{
    flex:1;
    aspect-ratio:1;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--card);
    border:1.5px solid var(--card-border);
    border-radius:12px;
    font-weight:700;
    font-family:var(--font-head);
    font-size:17px;
    cursor:pointer;
  }
  .scale-btn.selected{
    background:linear-gradient(180deg, var(--blue), #0d5f80);
    border-color:var(--blue);
    box-shadow:0 6px 18px var(--blue-glow);
  }
  .scale-caption{
    display:flex; justify-content:space-between;
    font-size:12px; color:var(--text-faint); margin:-14px 0 22px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:var(--radius);
    padding:22px;
  }
  .contexto-box{
    background:var(--bg-soft);
    border:1px solid var(--card-border);
    border-radius:12px;
    padding:18px 20px;
    font-family:'SF Mono', 'Consolas', monospace;
    font-size:13.5px;
    line-height:1.9;
    white-space:pre-wrap;
    color:#d6ecf5;
    margin-bottom:16px;
    max-height:340px;
    overflow-y:auto;
  }
  .contexto-box b{color:var(--orange); letter-spacing:.05em;}
  .instruction-box{
    display:flex;
    gap:10px;
    background:rgba(23,146,192,.1);
    border:1px solid rgba(23,146,192,.35);
    border-radius:12px;
    padding:14px 16px;
    font-size:13.5px;
    color:#cdeaf5;
    line-height:1.55;
    margin-bottom:24px;
  }
  .applied-badge{
    display:flex; align-items:center; gap:8px;
    font-size:13px; color:var(--green);
    background:rgba(52,211,153,.08);
    border:1px solid rgba(52,211,153,.25);
    border-radius:10px;
    padding:10px 14px;
    margin:0 0 18px;
  }
  .toast{
    position:fixed;
    bottom:24px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:#083248;
    border:1px solid var(--card-border);
    color:var(--text);
    padding:12px 20px;
    border-radius:10px;
    font-size:14px;
    font-weight:500;
    opacity:0;
    transition:opacity .25s ease, transform .25s ease;
    pointer-events:none;
    z-index:50;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
    max-width:88vw;
    text-align:center;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .loader-wrap{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; text-align:center; padding:60px 0;
  }
  .spinner{
    width:44px; height:44px;
    border:3px solid var(--card-border);
    border-top-color:var(--orange);
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .checkbox-row{
    display:flex; align-items:flex-start; gap:10px;
    font-size:13.5px; color:var(--text-dim); margin:2px 0 22px;
    cursor:pointer;
  }
  .checkbox-row input{width:auto; margin:2px 0 0;}
  footer.tiny{
    text-align:center; color:var(--text-faint); font-size:12px; margin-top:20px;
  }
  .brand-footer{display:flex; flex-direction:column; align-items:center; gap:10px;}
  .powered-by{display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text-faint); opacity:.85;}
  .powered-logo{width:14px; height:auto; opacity:.95;}
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:22px;}
  .stat-card{background:var(--card); border:1px solid var(--card-border); border-radius:12px; padding:16px;}
  .stat-num{font-family:var(--font-head); font-size:26px; font-weight:700;}
  .stat-label{font-size:12px; color:var(--text-faint); margin-top:2px;}
  .bar-row{margin-bottom:10px;}
  .bar-row .bar-label{display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px; color:var(--text-dim);}
  .bar-track{height:8px; background:var(--card-border); border-radius:99px; overflow:hidden;}
  .bar-fill{height:100%; background:linear-gradient(90deg, var(--blue), var(--orange)); border-radius:99px;}
  .tag-cloud{display:flex; flex-wrap:wrap; gap:8px 10px; margin-bottom:22px;}
  .tag{background:var(--card); border:1px solid var(--card-border); border-radius:99px; padding:6px 14px; color:var(--text-dim);}
  .section-title{font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-faint); margin:26px 0 12px;}

  /* Ferramenta (tool) selection */
  .tool-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:8px;}
  .tool-card{
    background:var(--card); border:1.5px solid var(--card-border); border-radius:14px;
    padding:16px 14px; cursor:pointer; text-align:left;
    transition:border-color .15s ease, background .15s ease, transform .1s ease;
  }
  .tool-card:hover{border-color:var(--blue); transform:translateY(-1px);}
  .tool-card .icon{font-size:22px; display:block; margin-bottom:6px;}
  .tool-card .name{font-weight:600; font-size:14.5px;}
  .tool-card.locked{opacity:.5;}
  .tool-card.locked .name::after{content:' 🔒'; font-size:11px;}
  .tool-card .soon-tag{font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.05em; margin-top:4px; display:block;}

  /* Multi-field sections */
  .field-grid{display:grid; grid-template-columns:1fr 1fr; gap:0 12px;}
  .field-item{margin-bottom:2px;}
  .field-item.full{grid-column:1 / -1;}
  .field-item label{display:block; font-size:12.5px; color:var(--text-faint); margin-bottom:5px;}
  .field-item input, .field-item select, .field-item textarea{margin-bottom:14px;}
  .chip-grid{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px;}
  .chip{padding:9px 14px; border-radius:99px; background:var(--card); border:1.5px solid var(--card-border); font-size:13.5px; cursor:pointer;}
  .chip.selected{border-color:var(--blue); background:linear-gradient(90deg, rgba(23,146,192,.22), rgba(23,146,192,.06)); color:#fff;}
  @media (max-width:420px){
    .field-grid{grid-template-columns:1fr;}
    .tool-grid{grid-template-columns:1fr 1fr;}
  }
  @media (max-width:380px){
    h1{font-size:26px;}
    .scale-btn{font-size:15px;}
  }
</style>
</head>

// ---------- Persistência ----------
function loadRecords(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch(e){ return []; }
}
function saveRecords(records){ localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); }
function upsertRecord(partial){
  const records = loadRecords();
  let rec = records.find(r => r.id === state.recordId);
  if(!rec){
    rec = {
      id: state.recordId,
      created_at: new Date().toISOString(),
      diagnostico: {},
      pesquisa: {},
      lead: null,
      funil: { iniciou_diagnostico:true, escolheu_ferramenta:false, concluiu_diagnostico:false, concluiu_pesquisa:false, virou_lead:false }
    };
    records.push(rec);
  }
  Object.assign(rec, partial);
  saveRecords(records);
  return rec;
}
function newId(){ return 'nv_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

function logToolInterest(toolName){
  let list = [];
  try{ list = JSON.parse(localStorage.getItem(INTEREST_KEY)) || []; }catch(e){ list = []; }
  const entry = { id: newId(), interesse: toolName, ts: new Date().toISOString() };
  list.push(entry);
  localStorage.setItem(INTEREST_KEY, JSON.stringify(list));
  syncToSheet(entry, 'Interesse');
}

const SHEETS_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbyjAcZLp0zIj3esIQAppWlAqEBf1kd-4jZE2LcONNK7mSklRtj-w9p6oy6Sn6ziOMIR/exec';

function syncToSheet(payload, sheetName){
  if(!SHEETS_WEBHOOK_URL || SHEETS_WEBHOOK_URL.indexOf('COLE_AQUI') > -1) return;
  const body = Object.assign({ _sheet: sheetName }, payload);
  fetch(SHEETS_WEBHOOK_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body)
  }).catch(err => console.warn('Falha ao sincronizar com a planilha:', err));
}

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(()=> toastEl.classList.remove('show'), 2400);
}
function copyText(text){
  navigator.clipboard?.writeText(text).then(()=> showToast('Copiado ✓'))
    .catch(()=>{
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      showToast('Copiado ✓');
    });
}

// ---------- Camada 1: montagem do Contexto NAVE (texto visível ao usuário) ----------
function buildContextoNave(a){
  const g = [];
  g.push(`Tipo da obra: ${a.tipo_obra || '—'}`);
  g.push(`Finalidade: ${a.finalidade || '—'}`);
  g.push(`Área construída: ${a.area || '—'} m²`);
  if(a.pavimentos) g.push(`Número de pavimentos: ${a.pavimentos}`);
  if(a.local) g.push(`Local da obra: ${a.local}`);
  g.push(`Sistema construtivo: ${a.sistema_construtivo || '—'}`);
  if(a.padrao_acabamento) g.push(`Padrão de acabamento: ${a.padrao_acabamento}`);
  if(a.data_inicio) g.push(`Data de início: ${a.data_inicio}`);
  g.push(`Prazo contratual: ${a.prazo_contratual || '—'}`);
  if(a.dias_semana) g.push(`Dias trabalhados por semana: ${a.dias_semana}`);
  g.push(`Restrições gerais: ${(a.restricoes_gerais||'').trim() || 'Nenhuma restrição informada.'}`);

  const construtivasFields = [
    ['fundacao','Fundação'],['estrutura','Estrutura'],['tipo_laje','Tipo de laje'],['cobertura','Cobertura'],
    ['fachadas','Fachadas'],['revestimentos','Revestimentos'],['pisos','Pisos'],['pintura','Pintura'],
    ['esquadrias','Esquadrias'],['muros','Muros'],['piscina','Piscina'],['paisagismo','Paisagismo'],['urbanizacao','Urbanização']
  ];
  const c = construtivasFields.filter(([k]) => (a[k]||'').trim()).map(([k,label]) => `${label}: ${a[k]}`);

  const equipe = Array.isArray(a.equipe) && a.equipe.length ? a.equipe.join(', ') : 'Não informada';
  const r = [];
  r.push(`Equipe disponível: ${equipe}`);
  if(a.equipamentos) r.push(`Equipamentos: ${a.equipamentos}`);
  if(a.materiais_especiais) r.push(`Materiais especiais: ${a.materiais_especiais}`);
  r.push(`Restrições de execução: ${(a.restricoes_execucao||'').trim() || 'Nenhuma restrição informada.'}`);

  let out = `DADOS GERAIS\n${g.join('\n')}`;
  if(c.length) out += `\n\nCARACTERÍSTICAS CONSTRUTIVAS\n${c.join('\n')}`;
  out += `\n\nRECURSOS\n${r.join('\n')}`;
  return out;
}

function buildFullPrompt(toolId, contextoTexto){

  linhas.push('');
  linhas.push(`Utilize o contexto técnico abaixo para gerar a entrega: ${tool.label}.`);
  linhas.push('');
  linhas.push('CONTEXTO NAVE');
  linhas.push(contextoTexto);

function fieldHtml(field){
  const val = state.answers[field.key];
  const cls = 'field-item' + (field.full ? ' full' : '');
  const reqMark = field.required ? ' *' : '';
  if(field.type === 'select'){
    return `<div class="${cls}"><label>${field.label}${reqMark}</label>
      <select data-key="${field.key}">
        <option value="">Selecione</option>
        ${field.options.map(o => `<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('')}
      </select></div>`;
  }
  if(field.type === 'textarea'){
    return `<div class="${cls}"><label>${field.label}${reqMark}</label>
      <textarea data-key="${field.key}" placeholder="${field.placeholder||''}">${val||''}</textarea></div>`;
  }
  if(field.type === 'chips'){
    const selected = Array.isArray(val) ? val : [];
    const chips = field.options.map(o => `<div class="chip ${selected.includes(o)?'selected':''}" data-key="${field.key}" data-chip="${o}">${o}</div>`).join('');
    return `<div class="${cls}"><label>${field.label}</label><div class="chip-grid">${chips}</div></div>`;
  }
  const type = field.type === 'number' ? 'number' : 'text';
  const minAttr = field.min !== undefined ? ` min="${field.min}"` : '';
  const maxAttr = field.max !== undefined ? ` max="${field.max}"` : '';
  return `<div class="${cls}"><label>${field.label}${reqMark}</label>
    <input type="${type}" data-key="${field.key}" placeholder="${field.placeholder||''}" value="${val||''}"${minAttr}${maxAttr}></div>`;
}

function renderSection(){
  const section = SECTIONS[state.sectionIndex];
  const total = SECTIONS.length;
  const pct = 10 + Math.round(((state.sectionIndex+1) / total) * 80);

  app.innerHTML = `
    ${brandRow()}
    ${progressBar(pct)}
    <div class="screen" style="justify-content:flex-start;">
      <div class="eyebrow">Contexto NAVE · ${state.sectionIndex+2} de ${total+1}</div>
      <h2>${section.title}</h2>
      <p class="sub">${section.subtitle}</p>
      <div class="field-grid">${section.fields.map(fieldHtml).join('')}</div>
      <div class="btn-row" style="margin-top:8px;">
        <button class="btn btn-secondary" id="btnBack" style="flex:0 0 auto; width:56px;">←</button>
        <button class="btn btn-primary" id="btnNext">${state.sectionIndex===total-1 ? 'Gerar Contexto NAVE' : 'Continuar →'}</button>
      </div>
    </div>
  `;

  function validate(){
    return section.fields.every(f => {
      if(!f.required) return true;
      const v = state.answers[f.key];
      return v !== undefined && String(v).trim().length > 0;
    });
  }
  function refreshBtn(){ document.getElementById('btnNext').disabled = !validate(); }

  document.querySelectorAll('.field-item input, .field-item select, .field-item textarea').forEach(el => {
    const evt = (el.tagName === 'SELECT') ? 'change' : 'input';
    el.addEventListener(evt, () => {
      state.answers[el.dataset.key] = el.value;
      refreshBtn();
    });
    if(el.type === 'number'){
      el.addEventListener('blur', () => {
        const fieldDef = section.fields.find(f => f.key === el.dataset.key);
        if(fieldDef && el.value !== ''){
          let num = Number(el.value);
          if(fieldDef.max !== undefined && num > fieldDef.max) num = fieldDef.max;
          if(fieldDef.min !== undefined && num < fieldDef.min) num = fieldDef.min;
          el.value = num;
          state.answers[el.dataset.key] = String(num);
        }
      });
    }
  });
  document.querySelectorAll('.chip').forEach(el => {
    el.onclick = () => {
      const key = el.dataset.key;
      const val = el.dataset.chip;
      const arr = Array.isArray(state.answers[key]) ? state.answers[key].slice() : [];
      const idx = arr.indexOf(val);
      if(idx >= 0) arr.splice(idx,1); else arr.push(val);
      state.answers[key] = arr;
      renderSection();
    };
  });
  refreshBtn();

  document.getElementById('btnBack').onclick = () => {
    if(state.sectionIndex === 0){ goto('tool'); }
    else { state.sectionIndex--; renderSection(); }
  };
  document.getElementById('btnNext').onclick = () => {
    upsertRecord({ diagnostico: { ferramenta: state.tool, ...groupedAnswers() } });
    if(state.sectionIndex < total-1){
      state.sectionIndex++;
      renderSection();
    } else {
      goto('processing');
    }
  };
}

function groupedAnswers(){
  const a = state.answers;
  return {
    dados_gerais: {
      tipo_obra:a.tipo_obra, finalidade:a.finalidade, area:a.area, pavimentos:a.pavimentos, local:a.local,
      sistema_construtivo:a.sistema_construtivo, padrao_acabamento:a.padrao_acabamento, data_inicio:a.data_inicio,
      prazo_contratual:a.prazo_contratual, dias_semana:a.dias_semana, restricoes_gerais:a.restricoes_gerais
    },
    caracteristicas: {
      fundacao:a.fundacao, estrutura:a.estrutura, tipo_laje:a.tipo_laje, cobertura:a.cobertura, fachadas:a.fachadas,
      revestimentos:a.revestimentos, pisos:a.pisos, pintura:a.pintura, esquadrias:a.esquadrias, muros:a.muros,
      piscina:a.piscina, paisagismo:a.paisagismo, urbanizacao:a.urbanizacao
    },
    recursos: {
      equipe:a.equipe||[], equipamentos:a.equipamentos, materiais_especiais:a.materiais_especiais, restricoes_execucao:a.restricoes_execucao
    }
  };
}

function renderProcessing(){
  const tool = TOOLS[state.tool];
  app.innerHTML = `
    ${brandRow()}
    <div class="screen loader-wrap">
      <div class="spinner"></div>
      <div>Aplicando Especialista NAVE e Padrão de Entrega para ${tool.label}...</div>
    </div>
  `;
  setTimeout(()=>{
    const contexto = buildContextoNave(state.answers);
    const rec = loadRecords().find(r=>r.id===state.recordId);
    upsertRecord({
      diagnostico: { ferramenta: state.tool, ...groupedAnswers(), contexto_nave: contexto, especialista_usado: tool.especialista.titulo },
      funil: { ...rec.funil, concluiu_diagnostico:true }
    });
    state.gateCompleted = false;
    goto('resultado');
  }, 1400);
}

function renderResultado(){
  const tool = TOOLS[state.tool];
  const contexto = buildContextoNave(state.answers);
  const fullPrompt = buildFullPrompt(state.tool, contexto);
  const unlocked = !!state.gateCompleted;

  const ctaHtml = unlocked ? `
      <button class="btn btn-primary" id="btnCopy">📋 Copiar Contexto NAVE</button>
      <div class="instruction-box" style="margin-top:18px;">
        <span>💡</span>
        <span>Cole este Contexto NAVE no ChatGPT ou Claude. Ele já contém o padrão técnico de ${tool.label} — não é necessário escrever mais nada além de colar.</span>
      </div>
      <button class="btn btn-secondary" id="btnContinue">Continuar →</button>
  ` : `
      <div class="instruction-box" style="margin-top:4px;">
        <span>🔒</span>
        <span>Faltam só 2 passos rápidos para liberar a cópia e usar isso no ChatGPT ou Claude.</span>
      </div>
      <button class="btn btn-primary" id="btnContinueLocked">Continuar →</button>
  `;

  app.innerHTML = `
    ${brandRow()}
    <div class="screen" style="justify-content:flex-start;">
      <div class="eyebrow">${unlocked ? 'Liberado ✓' : 'Diagnóstico concluído ✓'}</div>
      <h2>${unlocked ? 'Seu Contexto NAVE está pronto para usar.' : 'Você acabou de concluir a primeira etapa do Método NAVE.'}</h2>
      <p class="sub">${unlocked ? 'Copie e cole no ChatGPT ou Claude para receber sua entrega.' : 'A maioria dos engenheiros utiliza IA sem organizar essas informações — e por isso recebe respostas genéricas.'}</p>
      <div class="applied-badge">✓ ${tool.especialista.titulo} e o Padrão de Entrega de ${tool.label} já foram aplicados ao seu contexto.</div>
      <div class="section-title">Seu Contexto NAVE</div>
      <div class="contexto-box">${contexto}</div>
      ${ctaHtml}
    </div>
  `;
  if(unlocked){
    document.getElementById('btnCopy').onclick = () => copyText(fullPrompt);
    document.getElementById('btnContinue').onclick = () => goto('obrigado');
  } else {
    document.getElementById('btnContinueLocked').onclick = () => { state.surveyIndex = 0; goto('survey_intro'); };
  }
}

function renderSurveyIntro(){
  app.innerHTML = `
    ${brandRow()}
    <div class="screen">
      <div class="eyebrow">Quase lá</div>
      <h2>Faltam só 5 perguntas para destravar sua missão.</h2>
      <p class="sub">Estamos calibrando os próximos sistemas do Método NAVE — suas respostas ajudam a decidir o que construir primeiro.</p>
      <button class="btn btn-primary" id="btnGo">Responder e seguir →</button>
    </div>
  `;
  document.getElementById('btnGo').onclick = () => goto('survey');
}

function renderSurveyStep(){
  const step = SURVEY_STEPS[state.surveyIndex];
  const total = SURVEY_STEPS.length;
  const pct = Math.round(((state.surveyIndex) / total) * 100) + 6;
  const current = state.survey[step.key];

  let fieldHtmlStr = '';
  if(step.type === 'scale'){
    fieldHtmlStr = `<div class="scale-row">` + [1,2,3,4,5].map(n=>`
      <div class="scale-btn ${current===n?'selected':''}" data-val="${n}">${n}</div>`).join('') + `</div>
      <div class="scale-caption"><span>Não ajudou</span><span>Ajudou muito</span></div>`;
  } else if(step.type === 'single'){
    fieldHtmlStr = `<div class="options">` + step.options.map(opt=>`
      <div class="option ${current===opt?'selected':''}" data-opt="${opt}">
        <span>${opt}</span><span class="check"></span>
      </div>`).join('') + `</div>`;
    if(step.options.includes('Outro') && current === 'Outro'){
      fieldHtmlStr += `<input type="text" id="outroInput" placeholder="Especifique..." value="${state.survey[step.key+'_outro']||''}">`;
    }
  } else if(step.type === 'textarea'){
    fieldHtmlStr = `<textarea id="fieldInput" placeholder="${step.placeholder||''}">${current||''}</textarea>`;
  }

  app.innerHTML = `
    ${brandRow()}
    ${progressBar(pct)}
    <div class="screen">
      <div class="eyebrow">Pesquisa · ${state.surveyIndex+1} de ${total}</div>
      <h2>${step.question}</h2>
      ${fieldHtmlStr}
      <div class="btn-row" style="margin-top:8px;">
        <button class="btn btn-primary" id="btnNext" ${step.optional?'':'disabled'}>${state.surveyIndex===total-1?'Ir para a última etapa →':'Continuar →'}</button>
      </div>
    </div>
  `;

  function refreshNextState(){
    const btn = document.getElementById('btnNext');
    const val = state.survey[step.key];
    let ok = false;
    if(step.optional) ok = true;
    else if(step.type==='scale') ok = !!val;
    else if(step.type==='single') ok = !!val && (val!=='Outro' || (state.survey[step.key+'_outro']||'').trim().length>0);
    else ok = (val||'').trim().length>0;
    btn.disabled = !ok;
  }

  if(step.type==='scale'){
    document.querySelectorAll('.scale-btn').forEach(el=>{
      el.onclick = () => { state.survey[step.key] = Number(el.dataset.val); renderSurveyStep(); };
    });
  } else if(step.type==='single'){
    document.querySelectorAll('.option').forEach(el=>{
      el.onclick = () => { state.survey[step.key] = el.dataset.opt; renderSurveyStep(); };
    });
    const outroInput = document.getElementById('outroInput');
    if(outroInput){
      outroInput.oninput = (e) => { state.survey[step.key+'_outro'] = e.target.value; refreshNextState(); };
      outroInput.focus();
    }
  } else {
    const input = document.getElementById('fieldInput');
    input.oninput = (e) => { state.survey[step.key] = e.target.value; refreshNextState(); };
  }
  refreshNextState();

  document.getElementById('btnNext').onclick = () => {
    upsertRecord({ pesquisa: { ...state.survey } });
    if(state.surveyIndex < total-1){
      state.surveyIndex++;
      renderSurveyStep();
    } else {
      const rec = loadRecords().find(r=>r.id===state.recordId);
      upsertRecord({ funil: { ...rec.funil, concluiu_pesquisa:true } });
      goto('lead');
    }
  };
}

function renderLead(){
  app.innerHTML = `
    ${brandRow()}
    <div class="screen">
      <div class="eyebrow">Última etapa</div>
      <h2>Estou desenvolvendo o Método NAVE. Posso enviar gratuitamente as próximas versões?</h2>
      <p class="sub" style="margin-top:-8px;">Esse é o último passo — depois dele seu Contexto NAVE fica liberado para copiar.</p>
      <input type="text" id="nome" placeholder="Nome">
      <input type="email" id="email" placeholder="Email">
      <input type="tel" id="whatsapp" placeholder="WhatsApp (opcional)">
      <input type="text" id="instagram" placeholder="Instagram (opcional)">
      <label class="checkbox-row"><input type="checkbox" id="aceite"> Aceito receber novidades sobre o Método NAVE.</label>
      <button class="btn btn-primary" id="btnLead" disabled>Quero participar</button>
      <button class="btn btn-ghost" id="btnSkip">Agora não, obrigado</button>
    </div>
  `;
  const nome = document.getElementById('nome');
  const email = document.getElementById('email');
  const aceite = document.getElementById('aceite');
  const btn = document.getElementById('btnLead');
  function check(){
    btn.disabled = !(nome.value.trim() && /\S+@\S+\.\S+/.test(email.value) && aceite.checked);
  }
  [nome,email,aceite].forEach(el => el.addEventListener('input', check));
  aceite.addEventListener('change', check);

  btn.onclick = () => {
    const rec = loadRecords().find(r=>r.id===state.recordId);
    upsertRecord({
      lead: {
        nome: nome.value.trim(),
        email: email.value.trim(),
        whatsapp: document.getElementById('whatsapp').value.trim(),
        instagram: document.getElementById('instagram').value.trim(),
        aceite: true
      },
      funil: { ...rec.funil, virou_lead:true }
    });
    state.gateCompleted = true;
    goto('resultado');
  };
  document.getElementById('btnSkip').onclick = () => { state.gateCompleted = true; goto('resultado'); };
}

function renderObrigado(){
  app.innerHTML = `
    ${brandRow()}
    <div class="screen" style="text-align:center; align-items:center;">
      <div style="font-size:40px; margin-bottom:12px;">🚀</div>
      <h2>Obrigado!</h2>
      <p class="sub">Suas respostas foram registradas. Enquanto desenvolvemos novas funcionalidades do Método NAVE, acompanhe o conteúdo gratuito.</p>
      <a class="btn btn-primary" href="https://instagram.com" target="_blank" rel="noopener" style="text-decoration:none;">Seguir no Instagram</a>
      <div class="powered-by" style="margin-top:22px; justify-content:center;">
        <img src="data:image/png;base64,${LOGO_ICON_B64}" alt="Mar Aberto Engenharia" class="powered-logo">
        <span>Uma iniciativa da Mar Aberto Engenharia</span>
      </div>
    </div>
  `;
}

// ============================================================
// DASHBOARD ADMIN — acessível em teste-marca-nave.html?admin=1
// (lê os dados salvos neste navegador/dispositivo via localStorage)
// ============================================================
function renderAdmin(){
  const records = loadRecords();
  const total = records.length;
  const concluidos = records.filter(r=>r.funil?.concluiu_diagnostico).length;
  const concluiramPesquisa = records.filter(r=>r.funil?.concluiu_pesquisa).length;
  const leads = records.filter(r=>r.funil?.virou_lead).length;
  const taxaConclusao = total ? Math.round(concluidos/total*100) : 0;
  const taxaLead = concluidos ? Math.round(leads/concluidos*100) : 0;

  const ferramentaCounts = {};
  records.forEach(r=>{
    const f = r.diagnostico?.ferramenta;
    if(f) ferramentaCounts[TOOLS[f]?.label || f] = (ferramentaCounts[TOOLS[f]?.label || f]||0)+1;
  });
  const ferramentaTotal = Object.values(ferramentaCounts).reduce((a,b)=>a+b,0) || 1;

  const obraCounts = {};
  records.forEach(r=>{
    const o = r.diagnostico?.dados_gerais?.tipo_obra;
    if(o) obraCounts[o] = (obraCounts[o]||0)+1;
  });
  const obraTotal = Object.values(obraCounts).reduce((a,b)=>a+b,0) || 1;

  let interest = [];
  try{ interest = JSON.parse(localStorage.getItem(INTEREST_KEY)) || []; }catch(e){ interest = []; }
  const interestCounts = {};
  interest.forEach(i => { interestCounts[i.interesse] = (interestCounts[i.interesse]||0)+1; });
  const interestTotal = Object.values(interestCounts).reduce((a,b)=>a+b,0) || 1;

  const words = {};
  records.forEach(r=>{
    const txt = (r.pesquisa?.dificuldade || '').toLowerCase();
    txt.split(/[^a-zà-ú0-9]+/i).forEach(w=>{
      if(w.length>3) words[w] = (words[w]||0)+1;
    });
  });
  const topWords = Object.entries(words).sort((a,b)=>b[1]-a[1]).slice(0,16);

  function barBlock(counts, total){
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([k,v])=>{
      const pct = Math.round(v/total*100);
      return `<div class="bar-row"><div class="bar-label"><span>${k}</span><span>${pct}%</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div></div>`;
    }).join('') || `<p class="sub">Sem dados ainda.</p>`;
  }

  app.innerHTML = `
    ${brandRow(' · ADMIN')}
    <div class="screen" style="justify-content:flex-start;">
      <h2>Dashboard (dados locais deste navegador)</h2>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Diagnósticos iniciados</div></div>
        <div class="stat-card"><div class="stat-num">${taxaConclusao}%</div><div class="stat-label">Taxa de conclusão do diagnóstico</div></div>
        <div class="stat-card"><div class="stat-num">${concluiramPesquisa}</div><div class="stat-label">Concluíram a pesquisa</div></div>
        <div class="stat-card"><div class="stat-num">${leads}</div><div class="stat-label">Leads capturados</div></div>
      </div>
      <div class="stat-card" style="margin-bottom:22px;">
        <div class="stat-num">${taxaLead}%</div>
        <div class="stat-label">Conversão diagnóstico → lead</div>
      </div>
      <div class="section-title">Ferramentas mais solicitadas</div>
      ${barBlock(ferramentaCounts, ferramentaTotal)}
      <div class="section-title">Tipos de obra</div>
      ${barBlock(obraCounts, obraTotal)}
      <div class="section-title">Interesse em ferramentas futuras (roadmap)</div>
      ${barBlock(interestCounts, interestTotal)}
      <div class="section-title">Maiores dificuldades (nuvem de palavras)</div>
      <div class="tag-cloud">${topWords.map(([w,c])=>`<span class="tag" style="font-size:${11+Math.min(c,6)*2}px">${w}</span>`).join('') || '<p class="sub">Sem dados ainda.</p>'}</div>
      <p class="sub" style="margin-top:16px; font-size:12.5px;">⚠ Arquivo de teste de marca — dados isolados dos do diagnostico-nave.html principal.</p>
    </div>
  `;
}

render();
